name: Deploy Webapp

on:
  push:
    tags:
      - 'webapp-v*'

concurrency:
  group: deploy-webapp-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITHUB_ACTIONS: true
  KUBE_SERVER: ${{ secrets.KUBE_SERVER }}
  KUBE_CA: ${{ secrets.KUBE_CA }}
  KUBE_TOKEN: ${{ secrets.KUBE_TOKEN }}
  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: webapp-prod

    env:
      K8S_IMAGE_TAG: ${{ github.ref_name }}
      KUBE_CONTEXT: github-context

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Validate required secrets and variables
      run: |
        bash ./src/host/WriteFluency.AppHost/validate-required-env.sh \
          KUBE_SERVER \
          KUBE_CA \
          KUBE_TOKEN \
          GHCR_USERNAME \
          GHCR_TOKEN

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.x'
        cache: 'npm'
        cache-dependency-path: 'src/webapp/package-lock.json'

    - name: Install webapp dependencies
      working-directory: ./src/webapp
      run: npm ci

    - name: Run Angular tests
      working-directory: ./src/webapp
      run: npm test -- --no-watch --no-progress --browsers=ChromeHeadless

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install Aspirate
      run: dotnet tool install --global aspirate --version 9.1.0

    - name: Add .dotnet tools to PATH
      run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

    - name: Configure kubeconfig using Service Account
      run: |
        mkdir -p ~/.kube
        cat <<EOF2 > ~/.kube/config
        apiVersion: v1
        kind: Config
        clusters:
        - cluster:
            server: $KUBE_SERVER
            certificate-authority-data: $KUBE_CA
          name: cluster
        contexts:
        - context:
            cluster: cluster
            user: github
          name: github-context
        current-context: github-context
        users:
        - name: github
          user:
            token: $KUBE_TOKEN
        EOF2

    - name: Turn scripts executable
      run: |
        chmod +x ./src/host/WriteFluency.AppHost/build-k8s-images.sh
        chmod +x ./src/host/WriteFluency.AppHost/deploy-k8s.sh
        chmod +x ./src/host/WriteFluency.AppHost/generate-k8s-secret.sh

    - name: Login to GitHub Container Registry (GHCR)
      run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

    - name: Build webapp image
      working-directory: ./src/host/WriteFluency.AppHost
      run: ./build-k8s-images.sh webapp $K8S_IMAGE_TAG

    - name: Deploy webapp
      working-directory: ./src/host/WriteFluency.AppHost
      run: ./deploy-k8s.sh webapp $KUBE_CONTEXT
