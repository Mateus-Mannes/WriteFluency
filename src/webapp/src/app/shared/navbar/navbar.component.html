<mat-toolbar role="navigation" aria-label="Main navigation" class="app-toolbar">
  <div class="toolbar-content">
    <!-- Brand Logo -->
    <a class="brand" routerLink="/" aria-label="WriteFluency Home" (click)="onNavClick('brand', '/')">
      <img class="logo" src="../../../assets/app-icon.svg" alt="WriteFluency logo" width="36" height="36" />
      <span class="brand-text">
        <span class="text-primary-dark">Write</span><span class="text-primary">Fluency</span>
      </span>
    </a>

    <!-- Spacer -->
    <span class="spacer"></span>

    <!-- Navigation Links -->
    <nav class="nav-links">
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" aria-label="Home" (click)="onNavClick('home', '/')">
        <mat-icon aria-hidden="true">home</mat-icon>
        <span>Home</span>
      </a>
      <a class="nav-link" routerLink="/exercises" routerLinkActive="active" aria-label="Exercises" (click)="onNavClick('exercises', '/exercises')">
        <mat-icon aria-hidden="true">library_books</mat-icon>
        <span>Exercises</span>
      </a>
      <a class="nav-link" routerLink="/about" routerLinkActive="active" aria-label="About" (click)="onNavClick('about', '/about')">
        <mat-icon aria-hidden="true">info</mat-icon>
        <span>About</span>
      </a>

      @if (authSessionStore.isAuthenticated()) {
        <a class="nav-link" routerLink="/user" routerLinkActive="active" aria-label="My Progress" (click)="onNavClick('user', '/user')">
          <mat-icon aria-hidden="true">person</mat-icon>
          <span>My Progress</span>
        </a>
        <button class="nav-link nav-button" type="button" (click)="onLogout()" [disabled]="authSessionStore.state().isLoading">
          <mat-icon aria-hidden="true">logout</mat-icon>
          <span>Logout</span>
        </button>
      } @else {
        <a class="nav-link" routerLink="/auth/login" routerLinkActive="active" aria-label="Login" (click)="onNavClick('login', '/auth/login')">
          <mat-icon aria-hidden="true">person</mat-icon>
          <span>Login</span>
        </a>
      }
    </nav>
  </div>
</mat-toolbar>

@if (isLogoutConfirmationOpen()) {
  <div class="logout-confirmation-backdrop" (click)="dismissLogoutConfirmation()">
    <div
      class="logout-confirmation-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="logout-confirmation-title"
      (click)="$event.stopPropagation()">
      <h2 id="logout-confirmation-title">Log Out?</h2>
      <p class="logout-confirmation-description">
        You can keep using the app as a guest, and sign in again anytime.
      </p>
      <div class="logout-confirmation-actions">
        <button type="button" class="logout-secondary-button" (click)="dismissLogoutConfirmation()">
          Cancel
        </button>
        <button
          type="button"
          class="logout-primary-button"
          [disabled]="authSessionStore.state().isLoading"
          (click)="confirmLogout()">
          Log out
        </button>
      </div>
    </div>
  </div>
}
