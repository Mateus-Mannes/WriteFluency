<section class="auth-page">
  <mat-card class="auth-card">
    <header class="card-head">
      <h1 class="text-title">Create Account</h1>
      <p class="text-body subtitle">Register once, then sign in with email code or password.</p>
    </header>

    <form [formGroup]="registerForm" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="new-password" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword" autocomplete="new-password" />
      </mat-form-field>

      @if (errorMessage(); as error) {
        <p class="error text-body">{{ error }}</p>
      }

      @if (successMessage(); as success) {
        <p class="success text-body">{{ success }}</p>
      }

      <button mat-flat-button color="primary" class="primary-cta" type="submit" [disabled]="isBusy()">Register</button>
    </form>

    <div class="footer-links text-body">
      <a routerLink="/auth/login">Back to login</a>
    </div>
  </mat-card>
</section>
