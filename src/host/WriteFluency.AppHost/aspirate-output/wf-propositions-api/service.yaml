---
apiVersion: v1
kind: Service
metadata:
  name: wf-propositions-api
spec:
  type: ClusterIP
  selector:
    app: wf-propositions-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: https
    port: 8443
    targetPort: 8443
  - name: apihttp
    port: 5050
    targetPort: 5050
  - name: apihttps
    port: 5051
    targetPort: 5051
