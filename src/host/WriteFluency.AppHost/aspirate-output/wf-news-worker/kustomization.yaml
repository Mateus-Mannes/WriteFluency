resources:
- deployment.yaml
- service.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- name: wf-news-worker-env
  literals:
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EXCEPTION_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_EMIT_EVENT_LOG_ATTRIBUTES=true
    - OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY=in_memory
    - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
    - HTTPS_PORTS=8443
    - ConnectionStrings__wf-postgresdb=Host=wf-postgres;Port=5432;Username=postgres;Password=postgres;Database=wf-postgresdb
    - WF_POSTGRESDB_HOST=wf-postgres
    - WF_POSTGRESDB_PORT=5432
    - WF_POSTGRESDB_USERNAME=postgres
    - WF_POSTGRESDB_PASSWORD=postgres
    - WF_POSTGRESDB_URI=postgresql://postgres:{wf-postgres-password-uri-encoded.value}@wf-postgres:5432/wf-postgresdb
    - WF_POSTGRESDB_JDBCCONNECTIONSTRING=jdbc:postgresql://wf-postgres:5432/wf-postgresdb
    - WF_POSTGRESDB_DATABASENAME=wf-postgresdb
    - ConnectionStrings__wf-minio=Endpoint=http://wf-minio:9000;AccessKey=minioadmin;SecretKey=admin123
    - RESOURCE_NAME=wf-news-worker
    - ASPNETCORE_URLS=http://+:8080;

