apiVersion: batch/v1
kind: Job
metadata:
  name: wf-propositions-db-migrator
  labels:
    app: wf-propositions-db-migrator
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: wf-propositions-db-migrator
    spec:
      restartPolicy: Never
      terminationGracePeriodSeconds: 180
      imagePullSecrets:
      - name: ghcr-secret
      initContainers:
      - name: wait-for-postgres
        image: busybox
        command: ['sh', '-c', 'until nc -z wf-infra-postgres 5432; do echo waiting for postgres; sleep 2; done;']
      containers:
      - name: wf-propositions-db-migrator
        image: ghcr.io/mateus-mannes/wf-propositions-db-migrator:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: wf-propositions-db-migrator-env
        - secretRef:
            name: wf-propositions-secrets
